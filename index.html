<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault App</title>
  <style>
    /* --- Base styles --- */
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg-color, #111);
      color: var(--text-color, #fff);
    }

    header, footer {
      height: 56px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      padding: 0 12px;
    }

    main {
      padding: 12px;
    }

    /* --- Settings scroll fix --- */
    .settings-container {
      box-sizing: border-box;
      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      max-height: calc(100vh - 56px - 56px);
      padding-bottom: 24px;
    }
    body.settings-open { overflow: visible !important; }

    /* --- Category pills fix --- */
    .category-pills {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      flex-wrap: wrap;
      overflow: visible;
      position: relative;
    }
    .category-pills .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      white-space: nowrap;
      cursor: pointer;
    }
    @media (max-width: 720px) {
      .category-pills { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .category-pills::after { content:""; flex:0 0 12px; }
    }
    .category-pills.scrollable::before,
    .category-pills.scrollable::after {
      content:"";
      position:absolute; top:0; bottom:0; width:36px; pointer-events:none;
    }
    .category-pills.scrollable::before { left:0; background:linear-gradient(90deg,var(--bg-color,#111),transparent); }
    .category-pills.scrollable::after { right:0; background:linear-gradient(270deg,var(--bg-color,#111),transparent); }

    /* --- Search bar cancel button --- */
    .search-bar {
      display:flex; gap:8px; align-items:center;
      padding:8px 12px; background:rgba(255,255,255,0.06);
      border-radius:8px;
    }
    .search-bar input { flex:1; padding:6px; }
    .search-bar button.cancel-btn {
      background:rgba(255,255,255,0.12);
      border:none; border-radius:4px; padding:6px 10px;
      cursor:pointer;
    }

    /* --- Stats row --- */
    .stats-row { display:flex; gap:12px; margin:12px 0; }
    .stat-card {
      flex:1; padding:12px; border-radius:8px;
      background:rgba(255,255,255,0.06);
      cursor:pointer; text-align:center;
    }

    /* --- Popup for category breakdown --- */
    .popup {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:#222; color:#fff;
      padding:20px; border-radius:8px;
      display:none; z-index:1000;
    }
    .popup.active { display:block; }
    .popup h3 { margin-top:0; }
    .popup button { margin-top:12px; }
  </style>
</head>
<body>
  <header>
    <h1>Vault</h1>
  </header>

  <main>
    <!-- Search bar -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search entries...">
      <button class="cancel-btn" id="cancelSearch">Cancel</button>
    </div>

    <!-- Stats row -->
    <div class="stats-row">
      <div class="stat-card" id="favouritesStat">⭐ Favourites</div>
      <div class="stat-card" id="categoriesStat">📂 Categories</div>
    </div>

    <!-- Category pills -->
    <div class="category-pills" id="categoryPills">
      <button class="pill">All</button>
      <button class="pill">Banking</button>
      <button class="pill">Insurance</button>
      <button class="pill">Work</button>
      <button class="pill">School</button>
    </div>

    <!-- Settings -->
    <div class="settings-container" id="settings">
      <h2>Settings</h2>
      <p>Options...</p>
      <h3 id="about">About</h3>
      <p>Vault App v2.0</p>
    </div>
  </main>

  <footer>
    <span>© 2026 Vault</span>
  </footer>

  <!-- Category breakdown popup -->
  <div class="popup" id="categoriesPopup">
    <h3>Category Breakdown</h3>
    <div id="categoryBreakdown"></div>
    <button id="closePopup">Close</button>
  </div>

  <script>
    // --- Search bar cancel button ---
    document.getElementById('cancelSearch').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
    });

    // --- Favourites stat card jump ---
    document.getElementById('favouritesStat').addEventListener('click', () => {
      alert('Jumping to Starred tab...');
      // Replace with actual tab switch logic
    });

    // --- Categories stat card breakdown ---
    const categoriesStat = document.getElementById('categoriesStat');
    const popup = document.getElementById('categoriesPopup');
    const closePopup = document.getElementById('closePopup');
    const breakdownDiv = document.getElementById('categoryBreakdown');

    categoriesStat.addEventListener('click', () => {
      // Example breakdown counts
      const counts = { Banking: 3, Insurance: 2, Work: 5, School: 4 };
      breakdownDiv.innerHTML = Object.entries(counts)
        .map(([cat, num]) => `<p>${cat}: ${num}</p>`).join('');
      popup.classList.add('active');
    });
    closePopup.addEventListener('click', () => popup.classList.remove('active'));

    // --- Backup reminder every 30 days ---
    const lastBackupKey = 'lastBackupDate';
    function checkBackupReminder() {
      const last = localStorage.getItem(lastBackupKey);
      const now = Date.now();
      if (!last || (now - parseInt(last)) > 30*24*60*60*1000) {
        alert('Reminder: Please backup your vault!');
        localStorage.setItem(lastBackupKey, now.toString());
      }
    }
    checkBackupReminder();

    // --- Category pills scrollable state ---
    const container = document.getElementById('categoryPills');
    function updateScrollableState() {
      if (container.scrollWidth > container.clientWidth + 1) {
        container.classList.add('scrollable');
      } else {
        container.classList.remove('scrollable');
      }
    }
    updateScrollableState();
    window.addEventListener('resize', updateScrollableState);

    // --- Settings scroll fix (auto scroll to About) ---
    const settingsEl = document.getElementById('settings');
    function onSettingsOpen() {
      document.body.classList.add('settings-open');
      const aboutAnchor = document.getElementById('about');
      if (aboutAnchor) {
        setTimeout(() => aboutAnchor.scrollIntoView({ behavior: 'smooth', block: 'center' }), 120);
      }
    }
    onSettingsOpen();
  </script>
</body>
</html>
